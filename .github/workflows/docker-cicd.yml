name: cicd-ass
on: 
  push:
    branches:
      - main



jobs:
  dockerpush-image:
    runs-on: ubuntu-latest
    steps:

      - name: checkout-repo
        uses: actions/checkout@v4

      - name: docker login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/java-app:${{ github.ref_name }}
       
           
